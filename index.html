<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Dì Ngọc Anh ✨💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #fff5f6; 
            font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* MÀN HÌNH HỘP QUÀ */
        #gift-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            background: #ffdde1;
        }
        .gift-box {
            width: 120px; height: 120px; background: #d81b60;
            position: relative; cursor: pointer; border-radius: 12px;
            animation: bounce 1.5s infinite;
        }
        .gift-box::before { content: ''; position: absolute; width: 25px; height: 100%; background: #ffd700; left: 50%; transform: translateX(-50%); }
        .gift-box::after { content: ''; position: absolute; height: 25px; width: 100%; background: #ffd700; top: 50%; transform: translateY(-50%); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* MÀN HÌNH ALBUM - CHỈNH CHUẨN CHO IPHONE */
        #photo-screen { 
            display: none; width: 100%; text-align: center; 
            padding: 10px; animation: fadeIn 1s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .memory-sphere {
            position: relative; 
            width: 85vw; /* Thu nhỏ theo chiều rộng màn hình iPhone */
            height: 85vw; 
            max-width: 300px; max-height: 300px;
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.5);
            border: 5px solid #fff; margin: 0 auto 20px;
            background: #fff;
        }
        
        .slide-item {
            position: absolute; inset: 0; 
            /* DÙNG CONTAIN VÀ CENTER 10% ĐỂ THẤY TRỌN ĐẦU TRÊN IPHONE */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center 10%; 
            opacity: 0; transition: 0.8s ease-in-out;
        }
        .slide-item.active { opacity: 1; }
        
        .button-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .button-controls button {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: #ff69b4; color: #fff; font-size: 20px;
        }
        .button-controls button:first-child { border: 2px solid #3b82f6; } /* Nút trái viền xanh */
        
        .title-final { 
            font-family: 'Dancing Script', cursive; 
            font-size: 24px; color: #d81b60; margin-top: 20px; 
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="nhac-cuoi.mp3" loop></audio>

    <div id="gift-screen" onclick="startEverything()">
        <div class="gift-box"></div>
        <p style="margin-top:20px; color:#d81b60; font-family:'Dancing Script'">Chạm để mở quà dì nhé! ✨</p>
    </div>

    <div id="photo-screen">
        <div class="memory-sphere">
            <div class="slide-item active" style="background-image: url('1.jpeg');"></div>
            <div class="slide-item" style="background-image: url('2.jpeg');"></div>
            <div class="slide-item" style="background-image: url('3.jpeg');"></div>
            <div class="slide-item" style="background-image: url('4.jpeg');"></div>
            <div class="slide-item" style="background-image: url('5.jpeg');"></div>
            <div class="slide-item" style="background-image: url('6.jpeg');"></div>
            <div class="slide-item" style="background-image: url('7.jpeg');"></div>
            <div class="slide-item" style="background-image: url('8.jpeg');"></div>
            <div class="slide-item" style="background-image: url('9.jpeg');"></div>
            <div class="slide-item" style="background-image: url('10.jpeg');"></div>
            <div class="slide-item" style="background-image: url('11.jpeg');"></div>
        </div>
        <div class="button-controls">
            <button onclick="updateSlides('prev')">❮</button>
            <button onclick="updateSlides('next')">❯</button>
        </div>
        <div class="title-final">Mãi Hạnh Phúc Dì Nhé! ❤️</div>
    </div>

    <script>
        function startEverything() {
            document.getElementById('bgMusic').play();
            document.getElementById('gift-screen').style.display = 'none';
            document.getElementById('photo-screen').style.display = 'block';
        }

        const slides = document.querySelectorAll('.slide-item');
        let currentIndex = 0;
        function updateSlides(direction) {
            slides[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % slides.length;
            else currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            slides[currentIndex].classList.add('active');
        }
        setInterval(() => { if(document.getElementById('photo-screen').style.display === 'block') updateSlides('next'); }, 4000);
    </script>
</body>
</html>
