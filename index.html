<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Dì Ngọc Anh ✨💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #fff5f6 0%, #ffdde1 100%); 
            font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        /* 1. MÀN HÌNH HỘP QUÀ */
        #gift-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            background: #ffdde1; transition: 1s ease;
        }
        .gift-box {
            width: 140px; height: 140px; background: #d81b60;
            position: relative; cursor: pointer; border-radius: 15px;
            animation: bounce 1.5s infinite;
        }
        .gift-box::before { content: ''; position: absolute; width: 30px; height: 100%; background: #ffd700; left: 50%; transform: translateX(-50%); }
        .gift-box::after { content: ''; position: absolute; height: 30px; width: 100%; background: #ffd700; top: 50%; transform: translateY(-50%); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* 2. MÀN HÌNH LỜI CHÚC */
        #wish-screen {
            position: fixed; inset: 0; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.95); z-index: 90;
        }
        .wish-text { 
            font-family: 'Dancing Script', cursive; font-size: 23px; 
            line-height: 1.6; color: #ad1457; text-align: center; white-space: pre-line;
        }
        .btn-open {
            margin-top: 25px; padding: 12px 35px; font-family: 'Dancing Script', cursive;
            font-size: 20px; border: none; background: #ff69b4; color: white;
            border-radius: 30px; cursor: pointer; display: none;
        }

        /* 3. MÀN HÌNH ALBUM - CHỈNH BÉ ẢNH Ở ĐÂY */
        #photo-screen { display: none; opacity: 0; transition: 2s; text-align: center; width: 100%; z-index: 80; }
        
        .memory-sphere {
            position: relative; 
            width: 320px; height: 320px;
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 182, 193, 0.6);
            border: 6px solid #fff; margin: 0 auto 20px;
            background: #fff; /* Nền trắng nếu ảnh không lấp đầy vòng tròn */
        }
        
        .slide-item {
            position: absolute; inset: 0; 
            /* SỬA LỖI MẤT ĐẦU: contain để ảnh thu nhỏ vừa khít khung */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center; 
            transition: 1.2s ease-in-out; opacity: 0;
        }
        .slide-item.active { opacity: 1; }
        
        .button-controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .button-controls button {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: #ff69b4; color: #fff; font-size: 22px; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .button-controls button:first-child { border: 3px solid #3b82f6; } /* Viền xanh nút trái */
        
        .title-final { font-family: 'Dancing Script', cursive; font-size: 28px; color: #d81b60; margin-top: 15px; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="nhac-cuoi.mp3" loop preload="auto"></audio>

    <div id="gift-screen">
        <div class="gift-box" onclick="startEverything()"></div>
        <p style="font-family: 'Dancing Script', cursive; margin-top: 20px; color: #d81b60; font-size: 20px;">Gõ nhẹ vào hộp quà dì nhé! ✨🎁</p>
    </div>

    <div id="wish-screen">
        <div style="background: white; padding: 30px; border-radius: 20px; border: 2px dashed #ffb6c1;">
            <div class="wish-text" id="wishText"></div>
            <button class="btn-open" id="btnContinue" onclick="showPhotos()">Bấm để xem kỷ niệm 📸✨</button>
        </div>
    </div>

    <div id="photo-screen">
        <div class="memory-sphere">
            <div class="slide-item active" style="background-image: url('1.jpg');"></div>
            <div class="slide-item" style="background-image: url('2.jpg');"></div>
            <div class="slide-item" style="background-image: url('3.jpeg');"></div>
            <div class="slide-item" style="background-image: url('4.jpeg');"></div>
            <div class="slide-item" style="background-image: url('5.jpg');"></div>
            <div class="slide-item" style="background-image: url('6.jpeg');"></div>
            <div class="slide-item" style="background-image: url('7.jpeg');"></div>
            <div class="slide-item" style="background-image: url('8.jpeg');"></div>
            <div class="slide-item" style="background-image: url('9.jpeg');"></div>
            <div class="slide-item" style="background-image: url('10.jpeg');"></div>
            <div class="slide-item" style="background-image: url('11.jpeg');"></div>
        </div>
        <div class="button-controls">
            <button onclick="updateSlides('prev')">❮</button>
            <button onclick="updateSlides('next')">❯</button>
        </div>
        <div class="title-final">Mãi Hạnh Phúc Dì Nhé! ❤️</div>
    </div>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const message = "Dì Ngọc Anh thương yêu! 🌸\n\nNgày hạnh phúc nhất đã đến rồi. Cháu chúc dì luôn ngập tràn tiếng cười và được chú yêu thương thật nhiều nhé! 💍✨\n\nMón quà này cháu tự tay làm, gói gọn những kỷ niệm của dì...\n\nYêu dì của cháu nhiều lắm! ❤️";

        function startEverything() {
            bgMusic.play();
            document.getElementById('gift-screen').style.display = 'none';
            document.getElementById('wish-screen').style.display = 'flex';
            typeWriter(message, 0);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                document.getElementById('wishText').innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50);
            } else { document.getElementById('btnContinue').style.display = 'inline-block'; }
        }

        function showPhotos() {
            document.getElementById('wish-screen').style.display = 'none';
            document.getElementById('photo-screen').style.display = 'block';
            setTimeout(() => document.getElementById('photo-screen').style.opacity = '1', 100);
        }

        const slides = document.querySelectorAll('.slide-item');
        let currentIndex = 0;
        function updateSlides(direction) {
            slides[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % slides.length;
            else currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            slides[currentIndex].classList.add('active');
        }
        setInterval(() => { if (document.getElementById('photo-screen').style.display === 'block') updateSlides('next'); }, 4000);
    </script>
</body>
</html>
